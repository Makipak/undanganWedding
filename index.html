<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./dist/output.css">

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>

    <title>Undangan Ah momen</title>
</head>
<body>
    <!-- SVG filter untuk efek angin pada bunga (di-reference via CSS filter: url(#wind)) -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
        <defs>
            <filter id="wind" x="-20%" y="-20%" width="140%" height="140%">
                <feTurbulence type="fractalNoise" baseFrequency="0.015 0.02" numOctaves="2" seed="3" result="turb"/>
                <feDisplacementMap in="SourceGraphic" in2="turb" scale="5" xChannelSelector="R" yChannelSelector="G"/>
            </filter>
        </defs>
    </svg>

    <div id="stateSatu" class="relative flex items-center justify-center h-screen">
        <h1 class="font-vivaldi text-4xl text-[#585f26] mb-65">You're Invited!</h1>

        <!-- layer awal -->
        <div class="absolute flex items-center justify-center w-100 h-auto">
            <img src="assets/img/halamanSatu/pohon.webp" alt="" class="w-90 h-auto absolute">
        </div>

        <!-- layer dua -->
        <div class="absolute flex items-center justify-center">
            <div class="w-60 h-auto absolute">
                <img src="assets/img/halamanSatu/bgPutih.webp" alt="">
            </div>

            <div class="w-55 h-auto absolute">
                <img src="assets/img/halamanSatu/bg.webp" alt="">
            </div>
        </div>
        
        <!-- layer tiga -->
        <div class="absolute flex items-center justify-center">
            <div class="w-30 h-auto absolute -translate-x-25 translate-y-10">
                <img src="assets/img/halamanSatu/pot.webp" alt="">
            </div>
            <div class="w-35 h-auto absolute -translate-x-25 translate-y-20">
                <img src="assets/img/halamanSatu/batuKiri.webp" alt="">
            </div>
            <div class="w-35 h-auto absolute translate-x-25 translate-y-20">
                <img src="assets/img/halamanSatu/batuKanan.webp" alt="">
            </div>
            <div class="w-20 h-auto absolute -translate-x-30 translate-y-5">
                <img src="assets/img/halamanSatu/bungaKiri.webp" alt="">
            </div>
            <div class="w-30 h-auto absolute translate-x-30 translate-y-7">
                <img src="assets/img/halamanSatu/bungaKanan.webp" alt="">
            </div>
        </div>
        
        <div id="envelope" class="w-35 h-25 absolute flex items-center justify-center">
            <img src="assets/img/halamanSatu/amplopTutup.webp" alt="">
            <img class="w-7 h-auto absolute translate-y-2" src="assets/img/halamanSatu/pin.webp" alt="">
            <a id="openInvitationBtn" href="" class="absolute">
                <p class="font-lucida text-[7px] translate-y-9 text-white">Open Invitation</p>
            </a>
        </div>

        <h2 class="font-lucida absolute translate-y-31 text-[#585f26]">#foRAverMIne</h2>
    </div>

    <!-- state dua -->
    <div id="stateDua" class="page page-invitation">
        <!-- 1. Hero floral envelope -->
        <section class="relative flex items-center justify-center h-screen overflow-hidden">
            <!-- layer awal - pohon + janur (tambahan stateDua) -->
            <div class="absolute flex items-center justify-center w-100 h-auto">
                <img src="assets/img/halamanSatu/pohon.webp" alt="" class="w-90 h-auto absolute">
            </div>

            <!-- layer dua - bg panel (sama spt stateSatu) + layerAmplop -->
            <div class="absolute flex items-center justify-center">
                <div class="w-60 h-auto absolute">
                    <img src="assets/img/halamanSatu/bgPutih.webp" alt="">
                </div>
            </div>

            <!-- layer tiga - dekorasi (sama spt stateSatu) + objek tambahan stateDua -->
            <div class="absolute flex items-center justify-center">
                <div class="w-30 h-auto absolute -translate-x-25 translate-y-10">
                    <img src="assets/img/halamanSatu/pot.webp" alt="">
                </div>
                <div class="w-35 h-auto absolute -translate-x-25 translate-y-20">
                    <img src="assets/img/halamanSatu/batuKiri.webp" alt="">
                </div>
                <div class="w-35 h-auto absolute translate-x-25 translate-y-20">
                    <img src="assets/img/halamanSatu/batuKanan.webp" alt="">
                </div>
                <div class="w-30 h-auto absolute translate-x-28 -translate-y-17 scale-60">
                    <img src="assets/img/halamanSatu/stateDua/janurKanan.webp" alt="">
                </div>
                <div class="w-30 h-auto absolute -translate-x-28 -translate-y-17 scale-60">
                    <img src="assets/img/halamanSatu/stateDua/janurKiri.webp" alt="">
                </div>
                <div class="w-20 h-auto absolute -translate-x-30 translate-y-5">
                    <img src="assets/img/halamanSatu/bungaKiri.webp" alt="">
                </div>
                <!-- tambahan stateDua -->
                <div class="w-20 h-auto absolute -translate-x-30 translate-y-18">
                    <img src="assets/img/halamanSatu/stateDua/kol.webp" alt="">
                </div>
            </div>

            <!-- amplop buka - tengah (ganti amplopTutup+pin) -->
            <div id="amplopBukaWrapper" class="absolute -mt-20 scale-88">
                <div class="w-35 relative">
                    <img src="assets/img/halamanSatu/stateDua/amplopBuka.webp" alt="" class="w-full z-0 scale-130">
                    <img src="assets/img/halamanSatu/stateDua/objekTengah.webp" alt="" class="absolute z-10 w-28 rotate-7" style="left: 60%; top: -70px; transform: translateX(-50%)">
                    <img src="assets/img/halamanSatu/stateDua/objekKiri.webp" alt="" class="absolute z-10 w-25 scale-80" style="left: -37px; top: -80px;">
                    <img src="assets/img/halamanSatu/stateDua/objekKanan.webp" alt="" class="absolute z-10 w-22" style="right: -40px; top: -20px;">
                    <img src="assets/img/halamanSatu/stateDua/bungaPink.webp" alt="" class="absolute z-10 w-24" style="left: 60%; top: 50px; transform: translateX(-50%)">
                    <img src="assets/img/halamanSatu/stateDua/layerDepanAmplopBuka.webp" alt="" class="absolute top-17 left-0 w-50 h-auto scale-125 z-20">
                    <img src="assets/img/halamanSatu/stateDua/bungIjo.webp" alt="" class="absolute z-25 w-20" style="right: -60px; bottom: -80px;">
                </div>
            </div>

            <!-- bungaKanan - di depan layerAmplop & bungaijo -->
            <div class="absolute flex items-center justify-center">
                <div class="w-30 h-auto absolute translate-x-30 translate-y-7">
                    <img src="assets/img/halamanSatu/bungaKanan.webp" alt="">
                </div>
            </div>
        </section>

        <main class="mx-auto flex max-w-md flex-col items-center px-6">
        <!-- 2. Reveal -->
        <section class="-mt-24 w-full text-center">
            <h2 class="font-citadel text-5xl text-[#585f26]">Reveal</h2>
            <p class="font-glacial mt-2 text-[10px] tracking-[0.4em] text-[#7a7d35] uppercase">
            Scratch to discover the date
            </p>
    
            <!-- 3 scratch coins (foil: ./assets/coin-foil.png, content: 6 / 9 / 2026) -->
            <div class="text-[#7a7d35] mt-8 grid grid-cols-3 gap-4 text-">
                <div class="scratch-coin" data-coin>
                    <span class="coin-content text-5xl">6</span>
                    <canvas aria-hidden="true"></canvas>
                </div>
                <div class="scratch-coin" data-coin>
                    <span class="coin-content text-3xl">Sept</span>
                    <canvas aria-hidden="true"></canvas>
                </div>
                <div class="scratch-coin" data-coin>
                    <span class="coin-content text-3xl">2026</span>
                    <canvas aria-hidden="true"></canvas>
                </div>
            </div>

            <!-- 3. Save The Date -->
            <h2 class="font-citadel text-[26px] text-[#585f26] mt-8">
                Save The Date<span class="text-[#585f26]">!</span>
            </h2>
        </section>
    
        <!-- 4. Countdown -->
        <section class="mt-10 w-full text-center pb-12">
            <h2 class="font-citadel text-5xl text-[#585f26]">Countdown</h2>
    
            <!-- Numbers: 126 : 12 : 37 : 42 -->
            <div class="mt-6 flex items-center justify-center gap-3 text-[#585f26]">
            <span class="text-5xl font-light tabular-nums" id="cd-days">126</span>
            <span class="text-4xl">:</span>
            <span class="text-5xl font-light tabular-nums" id="cd-hours">12</span>
            <span class="text-4xl">:</span>
            <span class="text-5xl font-light tabular-nums" id="cd-minutes">37</span>
            <span class="text-4xl">:</span>
            <span class="text-5xl font-light tabular-nums" id="cd-seconds">42</span>
            </div>

            <!-- Labels: HARI JAM MNT DTK -->
            <div class="mt-3 flex items-center justify-center gap-3 text-xs tracking-[0.3em] text-[#585f26] uppercase">
            <span class="w-12 text-center">Hari</span>
            <span class="w-2"></span>
            <span class="w-12 text-center">Jam</span>
            <span class="w-2"></span>
            <span class="w-12 text-center">Mnt</span>
            <span class="w-2"></span>
            <span class="w-12 text-center">Dtk</span>
            </div>
        </section>

        <!-- Tombol ke halaman utama undangan -->
        <section class="w-full text-center pb-16 pt-4">
            <a href="main.html"
               class="inline-block font-glacial tracking-[0.3em] uppercase text-sm text-[#f9f5f0] bg-[#585f26] px-10 py-3 rounded-full hover:bg-[#5d794c] transition-colors duration-300">
                Buka Undangan
            </a>
        </section>

        </main>
    </div>
    <script src="js/index.js"></script>
</body>
</html>
